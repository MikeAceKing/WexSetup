server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = / {
    try_files /index.html =404;
  }

  location = /login {
    return 302 https://download.wexio.be/;
  }

  location = /download {
    return 301 https://download.wexio.be/;
  }

  location = /downloads {
    return 301 https://download.wexio.be/;
  }

  location = /windows {
    return 301 https://download.wexio.be/windows/;
  }

  location = /macos {
    return 301 https://download.wexio.be/macos/;
  }

  location = /linux {
    return 301 https://download.wexio.be/linux/;
  }

  location = /macOS {
    return 301 https://download.wexio.be/macos/;
  }

  location = /Linux {
    return 301 https://download.wexio.be/linux/;
  }

  location ^~ /macOS/ {
    return 301 https://download.wexio.be/macos/;
  }

  location ^~ /Linux/ {
    return 301 https://download.wexio.be/linux/;
  }

  location = /windows/WexioSetup.exe {
    try_files $uri =404;
    add_header Content-Type application/octet-stream;
    add_header Content-Disposition 'attachment; filename="WexioSetup.exe"';
  }

  location = /macos/WexioDesktop.dmg {
    try_files $uri =404;
    add_header Content-Type application/octet-stream;
    add_header Content-Disposition 'attachment; filename="WexioDesktop.dmg"';
  }

  location = /linux/WexioDesktop.AppImage {
    try_files $uri =404;
    add_header Content-Type application/octet-stream;
    add_header Content-Disposition 'attachment; filename="WexioDesktop.AppImage"';
  }

  location ^~ /windows/ {
    try_files $uri /windows/index.html =404;
  }

  location ^~ /macos/ {
    try_files $uri /macos/index.html =404;
  }

  location ^~ /linux/ {
    try_files $uri /linux/index.html =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}

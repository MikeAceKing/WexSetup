server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = / {
    try_files /index.html =404;
  }

  location = /login {
    return 302 /;
  }

  location = /windows {
    return 301 /windows/;
  }

  location = /macos {
    return 301 /macos/;
  }

  location = /linux {
    return 301 /linux/;
  }

  location = /macOS {
    return 301 /macos/;
  }

  location = /Linux {
    return 301 /linux/;
  }

  location ^~ /macOS/ {
    return 301 /macos/;
  }

  location ^~ /Linux/ {
    return 301 /linux/;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}

name: Publish Desktop Installers

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/publish-installers.yml'
      - 'desktop/**'
      - 'site/**'
      - 'installers/**'
      - 'Dockerfile'
      - 'nginx.conf'
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build
        required: false
        default: main

concurrency:
  group: publish-installers-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            artifact_name: windows-installer
            output_name: WexioSetup.exe
            find_script: |
              $artifact = Get-ChildItem -Path "desktop/src-tauri/target/release/bundle" -Recurse -File |
                Where-Object { $_.Extension -eq ".exe" -and $_.FullName -match "setup" } |
                Select-Object -First 1
              if (-not $artifact) { throw "Windows installer not found" }
              New-Item -ItemType Directory -Force -Path output | Out-Null
              Copy-Item $artifact.FullName "output/WexioSetup.exe" -Force
          - os: macos-latest
            label: macOS
            artifact_name: macos-installer
            output_name: WexioDesktop.dmg
            find_script: |
              artifact="$(find desktop/src-tauri/target/release/bundle -type f -name '*.dmg' | head -n 1)"
              if [ -z "$artifact" ]; then
                echo "macOS installer not found" >&2
                exit 1
              fi
              mkdir -p output
              cp "$artifact" "output/WexioDesktop.dmg"
          - os: ubuntu-22.04
            label: Ubuntu
            artifact_name: linux-installer
            output_name: WexioDesktop.AppImage
            find_script: |
              artifact="$(find desktop/src-tauri/target/release/bundle -type f -name '*.AppImage' | head -n 1)"
              if [ -z "$artifact" ]; then
                echo "Linux AppImage not found" >&2
                exit 1
              fi
              mkdir -p output
              cp "$artifact" "output/WexioDesktop.AppImage"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || 'main' }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libfuse2
          if apt-cache show libwebkit2gtk-4.1-dev > /dev/null 2>&1; then
            sudo apt-get install -y libwebkit2gtk-4.1-dev
          else
            sudo apt-get install -y libwebkit2gtk-4.0-dev
          fi
          if apt-cache show libayatana-appindicator3-dev > /dev/null 2>&1; then
            sudo apt-get install -y libayatana-appindicator3-dev
          else
            sudo apt-get install -y libappindicator3-dev
          fi

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Build installer
        working-directory: desktop
        run: npm run build

      - name: Collect Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: ${{ matrix.find_script }}

      - name: Collect Unix installer
        if: runner.os != 'Windows'
        shell: bash
        run: ${{ matrix.find_script }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: output/${{ matrix.output_name }}
          if-no-files-found: error

  publish:
    name: Publish installers to repo
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: installers/windows

      - name: Download macOS installer
        uses: actions/download-artifact@v4
        with:
          name: macos-installer
          path: installers/macos

      - name: Download Linux installer
        uses: actions/download-artifact@v4
        with:
          name: linux-installer
          path: installers/linux

      - name: Verify installer files
        shell: bash
        run: |
          test -f installers/windows/WexioSetup.exe
          test -f installers/macos/WexioDesktop.dmg
          test -f installers/linux/WexioDesktop.AppImage

      - name: Commit and push installers
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add installers/windows/WexioSetup.exe installers/macos/WexioDesktop.dmg installers/linux/WexioDesktop.AppImage
          if git diff --cached --quiet; then
            echo "No installer changes to publish"
            exit 0
          fi
          git commit -m "Publish desktop installers [skip ci]"
          git push origin HEAD:main

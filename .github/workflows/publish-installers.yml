name: Publish Desktop Installers

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/publish-installers.yml'
      - 'desktop/**'
      - 'site/**'
      - 'installers/**'
      - 'Dockerfile'
      - 'nginx.conf'
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build
        required: false
        default: main

concurrency:
  group: publish-installers-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            artifact_name: windows-installer
            output_name: WexioSetup.exe
            find_script: |
              $artifact = Get-ChildItem -Path "desktop/src-tauri/target/release/bundle" -Recurse -File |
                Where-Object { $_.Extension -eq ".exe" -and $_.FullName -match "setup" } |
                Select-Object -First 1
              if (-not $artifact) { throw "Windows installer not found" }
              New-Item -ItemType Directory -Force -Path output | Out-Null
              Copy-Item $artifact.FullName "output/WexioSetup.exe" -Force
          - os: macos-latest
            label: macOS
            artifact_name: macos-installer
            output_name: WexioDesktop.dmg
            find_script: |
              artifact="$(find desktop/src-tauri/target/release/bundle -type f -name '*.dmg' | head -n 1)"
              if [ -z "$artifact" ]; then
                echo "macOS installer not found" >&2
                exit 1
              fi
              mkdir -p output
              cp "$artifact" "output/WexioDesktop.dmg"
          - os: ubuntu-22.04
            label: Ubuntu
            artifact_name: linux-installer
            output_name: WexioDesktop.AppImage
            find_script: |
              artifact="$(find desktop/src-tauri/target/release/bundle -type f -name '*.AppImage' | head -n 1)"
              if [ -z "$artifact" ]; then
                echo "Linux AppImage not found" >&2
                exit 1
              fi
              mkdir -p output
              cp "$artifact" "output/WexioDesktop.AppImage"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || 'main' }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libgtk-3-dev \
            libxdo-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libfuse2
          if apt-cache show libjavascriptcoregtk-4.1-dev > /dev/null 2>&1; then
            sudo apt-get install -y libjavascriptcoregtk-4.1-dev
          fi
          if apt-cache show libwebkit2gtk-4.1-dev > /dev/null 2>&1; then
            sudo apt-get install -y libwebkit2gtk-4.1-dev
          else
            sudo apt-get install -y libwebkit2gtk-4.0-dev
          fi
          if apt-cache show libayatana-appindicator3-dev > /dev/null 2>&1; then
            sudo apt-get install -y libayatana-appindicator3-dev
          else
            sudo apt-get install -y libappindicator3-dev
          fi

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Import Windows signing certificate
        if: runner.os == 'Windows' && secrets.WINDOWS_CERTIFICATE != '' && secrets.WINDOWS_CERTIFICATE_PASSWORD != ''
        shell: pwsh
        run: |
          $certificatePath = Join-Path $env:RUNNER_TEMP "wexio-signing-cert.pfx"
          [System.IO.File]::WriteAllBytes($certificatePath, [System.Convert]::FromBase64String("${{ secrets.WINDOWS_CERTIFICATE }}"))
          $password = ConvertTo-SecureString -String "${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}" -AsPlainText -Force
          $imported = Import-PfxCertificate -FilePath $certificatePath -Password $password -CertStoreLocation Cert:\CurrentUser\My
          if (-not $imported) { throw "Failed to import Windows signing certificate" }
          "WINDOWS_CERTIFICATE_THUMBPRINT=$($imported.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Prepare Windows signing config
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_THUMBPRINT)) {
            Write-Host "No Windows signing certificate configured; building unsigned installer."
            exit 0
          }

          $config = @{
            tauri = @{
              bundle = @{
                windows = @{
                  certificateThumbprint = $env:WINDOWS_CERTIFICATE_THUMBPRINT
                  digestAlgorithm = "sha256"
                  timestampUrl = "http://timestamp.digicert.com"
                }
              }
            }
          } | ConvertTo-Json -Depth 10

          Set-Content -Path "desktop/src-tauri/tauri.windows.conf.json" -Value $config -Encoding UTF8

      - name: Build installer
        working-directory: desktop
        run: npm run build

      - name: Collect Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: ${{ matrix.find_script }}

      - name: Collect Unix installer
        if: runner.os != 'Windows'
        shell: bash
        run: ${{ matrix.find_script }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: output/${{ matrix.output_name }}
          if-no-files-found: error

  publish:
    name: Publish installers to repo
    runs-on: ubuntu-latest
    needs: build
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: windows-installer
          path: installers/windows

      - name: Download macOS installer
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: macos-installer
          path: installers/macos

      - name: Download Linux installer
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: linux-installer
          path: installers/linux

      - name: Verify available installer files
        shell: bash
        run: |
          ls -la installers/windows || true
          ls -la installers/macos || true
          ls -la installers/linux || true

      - name: Commit and push installers
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          found=0
          for artifact in \
            installers/windows/WexioSetup.exe \
            installers/macos/WexioDesktop.dmg \
            installers/linux/WexioDesktop.AppImage
          do
            if [ -f "$artifact" ]; then
              git add "$artifact"
              found=1
            fi
          done
          if [ "$found" -ne 1 ]; then
            echo "No installer artifacts available to publish"
            exit 0
          fi
          if git diff --cached --quiet; then
            echo "No installer changes to publish"
            exit 0
          fi
          git commit -m "Publish desktop installers [skip ci]"
          git push origin HEAD:main
